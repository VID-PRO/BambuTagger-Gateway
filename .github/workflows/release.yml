# ============================================================
#  BambuTagger-Gateway — Automatic Build & Release
#  Compiles the ESP32-S3 firmware and publishes a GitHub
#  Release every time a version tag (v*) is pushed.
#  A normal push / PR to main only compiles (smoke test,
#  no release).
# ============================================================

name: Build & Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
      - "[0-9]*"
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: platformio-${{ runner.os }}-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio --quiet
          pip install intelhex --quiet

      - name: Build with PlatformIO
        run: |
          pio run -e esp32-s3

      - name: Patch firmware.bin to QIO flash mode
        run: |
          python3 -c "
          import sys
          fw = '${{ github.workspace }}/.pio/build/esp32-s3/firmware.bin'
          with open(fw, 'rb') as f:
              data = bytearray(f.read())
          if data[2] == 0x00:
              print('Flash mode: QIO (correct)')
          else:
              old = data[2]
              data[2] = 0x00
              with open(fw, 'wb') as f:
                  f.write(data)
              print(f'Flash mode: patched from {old:#04x} to 0x00 (QIO)')
          "

      - name: Copy and rename artefacts
        run: |
          mkdir -p build
          cp "${{ github.workspace }}/.pio/build/esp32-s3/firmware.bin" \
             build/BambuTagger-Gateway.ino.bin

          echo "=== Build artefacts ==="
          ls -lh "${{ github.workspace }}/build/"

      - name: Upload firmware artefact
        uses: actions/upload-artifact@v4
        with:
          name: BambuTagger-Gateway-firmware-${{ github.sha }}
          retention-days: 30
          path: |
            build/BambuTagger-Gateway.ino.bin

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "BambuTagger-Gateway ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            build/BambuTagger-Gateway.ino.bin
          body: |
            ## Flashing instructions

            ### Via web UI (easiest)
            Navigate to **Configuration → OTA Update** and upload the `.bin` file.

            ### Via esptool (USB)
            ```bash
            esptool.py --port /dev/ttyACM0 --baud 921600 \
              write_flash --flash_mode qio 0x0 BambuTagger-Gateway.ino.bin
            ```

            > **Board:** Seeed XIAO ESP32-S3 (or any ESP32-S3 module with ≥8 MB flash)
            > **Framework:** Arduino (PlatformIO)
            > **Flash:** 8 MB, QIO 80 MHz
