# ============================================================
#  BambuTagger-Gateway — Automatic Build & Release
# ============================================================

name: Build & Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
      - "[0-9]*"
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: platformio-${{ runner.os }}-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio esptool --quiet

      - name: Build with PlatformIO
        run: |
          pio run -e esp32-s3

      - name: Create merged binary
        run: |
          BUILD=".pio/build/esp32-s3"
          BOOT="$BUILD/bootloader.bin"
          PART="$BUILD/partitions.bin"
          APP="$BUILD/firmware.bin"

          BOOT_APP0=$(find ~/.platformio/packages/framework-arduinoespressif32 \
            -name boot_app0.bin 2>/dev/null | head -1)
          echo "boot_app0: $BOOT_APP0"

          mkdir -p build
          cp "$BOOT" build/bootloader.bin
          cp "$PART" build/partitions.bin
          cp "$APP"  build/firmware.bin

          MERGED="build/BambuTagger-Gateway_merged.bin"

          esptool.py \
            --chip esp32s3 \
            merge-bin \
            --output "$MERGED" \
            --flash-mode qio \
            --flash-freq 80m \
            --flash-size 8MB \
            0x0      "$BOOT" \
            0x8000   "$PART" \
            0xe000   "$BOOT_APP0" \
            0x10000  "$APP"

          echo "=== Build artefacts ==="
          ls -lh build/

      - name: Upload firmware artefacts
        uses: actions/upload-artifact@v4
        with:
          name: BambuTagger-Gateway-firmware-${{ github.sha }}
          retention-days: 30
          path: build/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "BambuTagger-Gateway ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            build/bootloader.bin
            build/partitions.bin
            build/firmware.bin
            build/BambuTagger-Gateway_merged.bin
          body: |
            ## Flashing instructions

            ### Easiest — merged binary (single file, address 0x00)
            ```
            esptool.py --chip esp32s3 --port /dev/ttyACM0 --baud 921600 \
              write_flash 0x0 BambuTagger-Gateway_merged.bin
            ```

            ### Manual — three separate files
            ```
            esptool.py --chip esp32s3 --port /dev/ttyACM0 --baud 921600 \
              write_flash \
              0x0      bootloader.bin \
              0x8000   partitions.bin \
              0x10000  firmware.bin
            ```

            ### OTA
            Upload `firmware.bin` via the web interface (Configuration → OTA Update).

            > **Board:** Seeed XIAO ESP32-S3 (or any ESP32-S3 with ≥8 MB flash)
            > **Framework:** Arduino (PlatformIO)
            > **Flash:** 8 MB, QIO, 80 MHz
