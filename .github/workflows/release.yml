# ============================================================
#  BambuTagger-Gateway — Automatic Build & Release
#  Compiles the ESP32-S3 firmware and publishes a GitHub
#  Release every time a version tag (v*) is pushed.
#  A normal push / PR to main only compiles (smoke test,
#  no release).
# ============================================================

name: Build & Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
      - "[0-9]*"
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: platformio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: platformio-${{ runner.os }}-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio esptool --quiet

      - name: Build with PlatformIO
        run: |
          pio run -e esp32-s3

      - name: Copy and rename artefacts
        run: |
          mkdir -p build
          cp "${{ github.workspace }}/.pio/build/esp32-s3/firmware.bin"         build/BambuTagger-Gateway.ino.bin
          cp "${{ github.workspace }}/.pio/build/esp32-s3/bootloader.bin"       build/BambuTagger-Gateway.ino.bootloader.bin
          cp "${{ github.workspace }}/.pio/build/esp32-s3/partitions.bin"        build/BambuTagger-Gateway.ino.partitions.bin

          APP="${{ github.workspace }}/build/BambuTagger-Gateway.ino.bin"
          BOOT="${{ github.workspace }}/build/BambuTagger-Gateway.ino.bootloader.bin"
          PART="${{ github.workspace }}/build/BambuTagger-Gateway.ino.partitions.bin"
          MERGED="${{ github.workspace }}/build/BambuTagger-Gateway_merged.bin"

          esptool.py \
            --chip esp32s3 \
            merge_bin \
            --output "$MERGED" \
            --flash_mode qio \
            --flash_freq 80m \
            --flash_size 8MB \
            0x1000   "$BOOT" \
            0x8000   "$PART" \
            0x10000  "$APP"

          echo "=== Build artefacts ==="
          ls -lh "${{ github.workspace }}/build/"

      - name: Upload firmware artefacts
        uses: actions/upload-artifact@v4
        with:
          name: BambuTagger-Gateway-firmware-${{ github.sha }}
          retention-days: 30
          path: |
            build/BambuTagger-Gateway.ino.bin
            build/BambuTagger-Gateway.ino.bootloader.bin
            build/BambuTagger-Gateway.ino.partitions.bin
            build/BambuTagger-Gateway_merged.bin

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "BambuTagger-Gateway ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            build/BambuTagger-Gateway.ino.bin
            build/BambuTagger-Gateway.ino.bootloader.bin
            build/BambuTagger-Gateway.ino.partitions.bin
            build/BambuTagger-Gateway_merged.bin
          body: |
            ## Flashing instructions

            ### Easiest — merged binary (single file, address 0x00)
            ```
            esptool.py --chip esp32s3 --port /dev/ttyACM0 --baud 921600 \
              write_flash 0x0 BambuTagger-Gateway_merged.bin
            ```

            ### Manual — separate files
            ```
            esptool.py --chip esp32s3 --port /dev/ttyACM0 --baud 921600 \
              write_flash \
              0x1000   BambuTagger-Gateway.ino.bootloader.bin \
              0x8000   BambuTagger-Gateway.ino.partitions.bin \
              0x10000  BambuTagger-Gateway.ino.bin
            ```

            > **Board:** Seeed XIAO ESP32-S3 (or any ESP32-S3 module with ≥8 MB flash)
            > **Framework:** Arduino (PlatformIO)
            > **Flash:** 8 MB, QIO, 80 MHz

            ### OTA Update
            Upload `BambuTagger-Gateway.ino.bin` via the web interface (Configuration → OTA Update).
